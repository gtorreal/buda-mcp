openapi: 3.1.0
info:
  title: Buda.com Market Data API
  description: |
    Real-time cryptocurrency market data from Buda.com — the leading exchange
    in Chile (CLP), Colombia (COP), and Peru (PEN).
    Provides live prices, spreads, OHLCV history, order books, trade history, and volume for all markets.
    No authentication required for public tools.

    All response schemas are flat and typed: monetary amounts are returned as floats with
    separate _currency fields instead of [amount, currency] arrays.

    **Note:** This spec describes a deployed HTTP wrapper around the buda-mcp
    stdio server. Deploy locally with mcp-proxy:
      mcp-proxy --port 8000 -- npx -y @guiie/buda-mcp
    Or point `servers[0].url` at your hosted instance.
  version: 1.4.0
  contact:
    url: https://github.com/gtorreal/buda-mcp

servers:
  - url: https://YOUR_DEPLOYED_DOMAIN
    description: Deployed buda-mcp HTTP instance

paths:
  /get_markets:
    get:
      operationId: getMarkets
      summary: List all trading pairs
      description: |
        Lists all available markets on Buda.com, or details for a single market.
        Each market entry includes base/quote currencies, taker/maker fees as decimals,
        minimum order amount, and fee discount tiers.
        Example: 'What is the taker fee and minimum order size for BTC-CLP?'
      parameters:
        - name: market_id
          in: query
          required: false
          description: |
            Market identifier (e.g. "BTC-CLP", "ETH-BTC"). Case-insensitive.
            Omit to return all markets.
          schema:
            type: string
            example: BTC-CLP
      responses:
        "200":
          description: Market list or single market details
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/MarketsResponse"
                  - $ref: "#/components/schemas/SingleMarketResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /get_ticker:
    get:
      operationId: getTicker
      summary: Current price and volume for a market
      description: |
        Returns the current market snapshot: last traded price, best bid (max_bid),
        best ask (min_ask), 24h volume, and price change over 24h and 7d.
        All prices are floats in the quote currency. price_variation_24h is a decimal fraction.
        Example: 'What is the current Bitcoin price in Chilean pesos?'
      parameters:
        - name: market_id
          in: query
          required: true
          description: Market identifier (e.g. "BTC-CLP", "ETH-COP"). Case-insensitive.
          schema:
            type: string
            example: BTC-CLP
      responses:
        "200":
          description: Current ticker snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TickerResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /get_orderbook:
    get:
      operationId: getOrderbook
      summary: Order book for a market
      description: |
        Returns the current limit order book as typed objects with float price and amount fields.
        Bids are sorted highest-price first; asks lowest-price first.
        Prices are in the quote currency; amounts are in the base currency.
        Example: 'What are the top 5 buy and sell orders for BTC-CLP right now?'
      parameters:
        - name: market_id
          in: query
          required: true
          description: Market identifier (e.g. "BTC-CLP"). Case-insensitive.
          schema:
            type: string
            example: BTC-CLP
        - name: limit
          in: query
          required: false
          description: Max number of price levels to return per side. Defaults to all.
          schema:
            type: integer
            minimum: 1
            example: 20
      responses:
        "200":
          description: Order book bids and asks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderBookResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /get_trades:
    get:
      operationId: getTrades
      summary: Recent trade history for a market
      description: |
        Returns recent trades as typed objects with float fields.
        Each entry has timestamp_ms (integer), amount (float, base currency),
        price (float, quote currency), and direction ("buy" or "sell").
        Example: 'What was the last executed price for BTC-CLP and was it a buy or sell?'
      parameters:
        - name: market_id
          in: query
          required: true
          description: Market identifier (e.g. "BTC-CLP"). Case-insensitive.
          schema:
            type: string
            example: BTC-CLP
        - name: limit
          in: query
          required: false
          description: Number of trades to return (default 50, max 100).
          schema:
            type: integer
            minimum: 1
            maximum: 100
            example: 50
        - name: timestamp
          in: query
          required: false
          description: |
            Unix timestamp in seconds. Returns trades older than this value,
            for pagination through history.
          schema:
            type: integer
            example: 1712000000
      responses:
        "200":
          description: Trade history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradesResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /get_market_volume:
    get:
      operationId: getMarketVolume
      summary: 24h and 7-day volume for a market
      description: |
        Returns transacted volume as floats broken down by side (ask = sell, bid = buy)
        and time window (24h and 7d). All volumes are in the market's base currency.
        Example: 'How much Bitcoin was sold on BTC-CLP in the last 24 hours?'
      parameters:
        - name: market_id
          in: query
          required: true
          description: Market identifier (e.g. "BTC-CLP"). Case-insensitive.
          schema:
            type: string
            example: BTC-CLP
      responses:
        "200":
          description: Volume data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VolumeResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /get_spread:
    get:
      operationId: getSpread
      summary: Bid/ask spread for a market
      description: |
        Returns the best bid price, best ask price, absolute spread, and spread percentage
        as floats. spread_percentage is in percent (e.g. 0.15 means 0.15%).
        Example: 'Is BTC-CLP liquid enough to buy 10M CLP without significant slippage?'
      parameters:
        - name: market_id
          in: query
          required: true
          description: Market identifier (e.g. "BTC-CLP"). Case-insensitive.
          schema:
            type: string
            example: BTC-CLP
      responses:
        "200":
          description: Spread data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpreadResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /compare_markets:
    get:
      operationId: compareMarkets
      summary: Compare all pairs of a base currency side by side
      description: |
        Returns ticker data for all trading pairs of a given base currency across all supported
        quote currencies (CLP, COP, PEN, USDC, BTC, ETH). All prices and change values are floats.
        price_change_24h is in percent (e.g. 1.23 means +1.23%).
        Example: 'In which country is Bitcoin currently most expensive on Buda?'
      parameters:
        - name: base_currency
          in: query
          required: true
          description: Base currency to compare (e.g. "BTC", "ETH"). Case-insensitive.
          schema:
            type: string
            example: BTC
      responses:
        "200":
          description: Comparison of all pairs for the given base currency
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompareMarketsResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /get_price_history:
    get:
      operationId: getPriceHistory
      summary: OHLCV price history derived from trade history
      description: |
        IMPORTANT: Candles are aggregated client-side from raw trades (Buda has no native
        candlestick endpoint) — increase 'limit' for deeper history but expect slower responses.
        Returns OHLCV candles with float values (open/high/low/close in quote currency,
        volume in base currency). Candle timestamps are UTC bucket boundaries.
        Supports 1h, 4h, and 1d candle periods.
        Example: 'Show me the hourly BTC-CLP price chart for the past 24 hours.'
      parameters:
        - name: market_id
          in: query
          required: true
          description: Market identifier (e.g. "BTC-CLP"). Case-insensitive.
          schema:
            type: string
            example: BTC-CLP
        - name: period
          in: query
          required: false
          description: Candle period. One of "1h", "4h", "1d". Default is "1h".
          schema:
            type: string
            enum: ["1h", "4h", "1d"]
            default: "1h"
        - name: limit
          in: query
          required: false
          description: Number of raw trades to fetch before aggregation (default 100, max 1000). More trades = deeper history.
          schema:
            type: integer
            minimum: 1
            maximum: 1000
      responses:
        "200":
          description: OHLCV candles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceHistoryResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /get_market_summary:
    get:
      operationId: getMarketSummary
      summary: Complete market overview in a single call
      description: |
        One-call summary of everything relevant about a market: last price, best bid/ask,
        spread %, 24h volume, 24h and 7d price change, and a liquidity_rating.
        liquidity_rating: "high" (spread < 0.3%), "medium" (0.3–1%), "low" (> 1%).
        All prices and volumes are floats. Best first tool to call when a user asks about a specific market.
        Example: 'Give me a complete overview of the BTC-CLP market right now.'
      parameters:
        - name: market_id
          in: query
          required: true
          description: Market identifier (e.g. "BTC-CLP", "ETH-COP"). Case-insensitive.
          schema:
            type: string
            example: BTC-CLP
      responses:
        "200":
          description: Full market summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketSummaryResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /get_arbitrage_opportunities:
    get:
      operationId: getArbitrageOpportunities
      summary: Cross-country price discrepancies normalized to USDC
      description: |
        Detects price discrepancies for a given asset across Buda's CLP, COP, and PEN markets,
        normalized to USDC using current exchange rates. Returns pairwise discrepancies above
        threshold_pct, sorted descending by opportunity size.
        IMPORTANT: Buda taker fee is 0.8% per leg (~1.6% round-trip). Deduct fees before acting.
        Example: 'Is there an arbitrage opportunity for BTC between Chile and Peru right now?'
      parameters:
        - name: base_currency
          in: query
          required: true
          description: Base asset to scan (e.g. "BTC", "ETH"). Case-insensitive.
          schema:
            type: string
            example: BTC
        - name: threshold_pct
          in: query
          required: false
          description: Minimum discrepancy percentage to include (default 0.5). Round-trip fees ~1.6%.
          schema:
            type: number
            minimum: 0
            default: 0.5
            example: 1.0
      responses:
        "200":
          description: Arbitrage opportunities found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArbitrageResponse"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  schemas:
    Market:
      type: object
      properties:
        id:
          type: string
          example: BTC-CLP
        name:
          type: string
          example: btc-clp
        base_currency:
          type: string
          example: BTC
        quote_currency:
          type: string
          example: CLP
        minimum_order_amount:
          type: array
          items:
            type: string
          example: ["0.00001", "BTC"]
        taker_fee:
          type: string
          example: "0.8"
        maker_fee:
          type: string
          example: "0.4"
        max_orders_per_minute:
          type: integer
          example: 100
        maker_discount_percentage:
          type: string
        taker_discount_percentage:
          type: string

    MarketsResponse:
      type: object
      properties:
        markets:
          type: array
          items:
            $ref: "#/components/schemas/Market"

    SingleMarketResponse:
      type: object
      properties:
        market:
          $ref: "#/components/schemas/Market"

    TickerResponse:
      type: object
      properties:
        market_id:
          type: string
          example: BTC-CLP
        last_price:
          type: number
          example: 65675000
        last_price_currency:
          type: string
          example: CLP
        min_ask:
          type: number
          example: 65678531
        min_ask_currency:
          type: string
          example: CLP
        max_bid:
          type: number
          example: 65675000
        max_bid_currency:
          type: string
          example: CLP
        volume:
          type: number
          example: 5.00837363
        volume_currency:
          type: string
          example: BTC
        price_variation_24h:
          type: number
          description: Decimal fraction (e.g. 0.019 = +1.9%)
          example: 0.019
        price_variation_7d:
          type: number
          example: -0.032

    OrderBookEntry:
      type: object
      properties:
        price:
          type: number
          example: 65675000
        amount:
          type: number
          example: 0.01520608

    OrderBookResponse:
      type: object
      properties:
        bids:
          type: array
          description: Buy orders sorted highest-price first
          items:
            $ref: "#/components/schemas/OrderBookEntry"
        asks:
          type: array
          description: Sell orders sorted lowest-price first
          items:
            $ref: "#/components/schemas/OrderBookEntry"
        bid_count:
          type: integer
          description: Total number of bid levels in the full book
        ask_count:
          type: integer
          description: Total number of ask levels in the full book

    TradeEntry:
      type: object
      properties:
        timestamp_ms:
          type: integer
          example: 1775857164247
        amount:
          type: number
          example: 0.00113757
        price:
          type: number
          example: 65675000
        direction:
          type: string
          enum: [buy, sell]
          example: buy

    TradesResponse:
      type: object
      properties:
        timestamp:
          type: string
          description: Most recent trade timestamp (ms)
        last_timestamp:
          type: string
          description: Oldest trade timestamp in this response (ms)
        market_id:
          type: string
          example: BTC-CLP
        entries:
          type: array
          items:
            $ref: "#/components/schemas/TradeEntry"

    VolumeResponse:
      type: object
      properties:
        market_id:
          type: string
          example: BTC-CLP
        ask_volume_24h:
          type: number
          example: 0.63744329
        ask_volume_24h_currency:
          type: string
          example: BTC
        ask_volume_7d:
          type: number
          example: 7.41219004
        ask_volume_7d_currency:
          type: string
          example: BTC
        bid_volume_24h:
          type: number
          example: 4.37093034
        bid_volume_24h_currency:
          type: string
          example: BTC
        bid_volume_7d:
          type: number
          example: 11.93962368
        bid_volume_7d_currency:
          type: string
          example: BTC

    SpreadResponse:
      type: object
      properties:
        market_id:
          type: string
          example: BTC-CLP
        price_currency:
          type: string
          example: CLP
        best_bid:
          type: number
          example: 65675000
        best_ask:
          type: number
          example: 65678531
        spread_absolute:
          type: number
          example: 3531
        spread_percentage:
          type: number
          description: Spread as percent of ask price (e.g. 0.0054 means 0.0054%)
          example: 0.0054
        last_price:
          type: number
          example: 65675000

    CompareMarketsResponse:
      type: object
      properties:
        base_currency:
          type: string
          example: BTC
        markets:
          type: array
          items:
            type: object
            properties:
              market_id:
                type: string
                example: BTC-CLP
              last_price:
                type: number
                example: 65675000
              last_price_currency:
                type: string
                example: CLP
              best_bid:
                type: number
              best_ask:
                type: number
              volume_24h:
                type: number
              price_change_24h:
                type: number
                description: In percent (e.g. 1.23 means +1.23%)
                example: 1.23
              price_change_7d:
                type: number
                example: -1.20

    OhlcvCandle:
      type: object
      properties:
        time:
          type: string
          format: date-time
          example: "2026-04-10T12:00:00.000Z"
        open:
          type: number
          example: 65221078.43
        high:
          type: number
          example: 65975364
        low:
          type: number
          example: 65164404.87
        close:
          type: number
          example: 65386647
        volume:
          type: number
          example: 0.52341200
        trade_count:
          type: integer
          example: 12

    PriceHistoryResponse:
      type: object
      properties:
        market_id:
          type: string
          example: BTC-CLP
        period:
          type: string
          example: "1h"
        candle_count:
          type: integer
          example: 6
        trades_fetched:
          type: integer
          example: 100
        note:
          type: string
        candles:
          type: array
          items:
            $ref: "#/components/schemas/OhlcvCandle"

    MarketSummaryResponse:
      type: object
      properties:
        market_id:
          type: string
          example: BTC-CLP
        last_price:
          type: number
          example: 65675000
        last_price_currency:
          type: string
          example: CLP
        bid:
          type: number
          example: 65675000
        ask:
          type: number
          example: 65678531
        spread_pct:
          type: number
          description: Bid/ask spread as percentage of ask
          example: 0.0054
        volume_24h:
          type: number
          example: 5.00837363
        volume_24h_currency:
          type: string
          example: BTC
        price_change_24h:
          type: number
          description: In percent (e.g. 1.9 means +1.9%)
          example: 1.9
        price_change_7d:
          type: number
          example: -3.2
        liquidity_rating:
          type: string
          enum: [high, medium, low]
          description: "high: spread < 0.3%, medium: 0.3–1%, low: > 1%"
          example: high

    ArbitrageMarketPrice:
      type: object
      properties:
        market_id:
          type: string
          example: BTC-CLP
        price_usdc:
          type: number
          example: 65675
        local_price:
          type: number
          example: 65675000
        usdc_rate:
          type: number
          example: 1000

    ArbitrageOpportunity:
      type: object
      properties:
        market_a:
          type: string
          example: BTC-CLP
        market_b:
          type: string
          example: BTC-PEN
        price_a_usdc:
          type: number
          example: 65675
        price_b_usdc:
          type: number
          example: 67568
        discrepancy_pct:
          type: number
          example: 2.88
        higher_market:
          type: string
          example: BTC-PEN
        lower_market:
          type: string
          example: BTC-CLP

    ArbitrageResponse:
      type: object
      properties:
        base_currency:
          type: string
          example: BTC
        threshold_pct:
          type: number
          example: 0.5
        markets_analyzed:
          type: array
          items:
            $ref: "#/components/schemas/ArbitrageMarketPrice"
        opportunities_found:
          type: integer
          example: 1
        opportunities:
          type: array
          items:
            $ref: "#/components/schemas/ArbitrageOpportunity"
        fees_note:
          type: string
          example: "Buda taker fee is 0.8% per leg. A round-trip arbitrage costs approximately 1.6% in fees."

    Error:
      type: object
      properties:
        error:
          type: string
        code:
          oneOf:
            - type: string
            - type: integer

  responses:
    NotFound:
      description: Market not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
