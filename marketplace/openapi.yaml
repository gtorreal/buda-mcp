openapi: 3.1.0
info:
  title: Buda.com Market Data API
  description: |
    Real-time cryptocurrency market data from Buda.com — the leading exchange
    in Chile (CLP), Colombia (COP), and Peru (PEN).
    Provides live prices, spreads, OHLCV history, order books, trade history, and volume for all markets.
    No authentication required for public tools.

    **Note:** This spec describes a deployed HTTP wrapper around the buda-mcp
    stdio server. Deploy locally with mcp-proxy:
      mcp-proxy --port 8000 -- npx -y @guiie/buda-mcp
    Or point `servers[0].url` at your hosted instance.
  version: 1.2.0
  contact:
    url: https://github.com/gtorreal/buda-mcp

servers:
  - url: https://YOUR_DEPLOYED_DOMAIN
    description: Deployed buda-mcp HTTP instance

paths:
  /get_markets:
    get:
      operationId: getMarkets
      summary: List all trading pairs
      description: |
        Returns all available markets on Buda.com, or details for a single market.
        Each market entry includes base/quote currencies, trading fees, and minimum order amounts.
      parameters:
        - name: market_id
          in: query
          required: false
          description: |
            Market identifier (e.g. "BTC-CLP", "ETH-BTC"). Case-insensitive.
            Omit to return all markets.
          schema:
            type: string
            example: BTC-CLP
      responses:
        "200":
          description: Market list or single market details
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/MarketsResponse"
                  - $ref: "#/components/schemas/SingleMarketResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /get_ticker:
    get:
      operationId: getTicker
      summary: Current price and volume for a market
      description: |
        Returns the current market snapshot: last traded price, best bid (max_bid),
        best ask (min_ask), 24h volume, and price change over 24h and 7d.
      parameters:
        - name: market_id
          in: query
          required: true
          description: Market identifier (e.g. "BTC-CLP", "ETH-COP"). Case-insensitive.
          schema:
            type: string
            example: BTC-CLP
      responses:
        "200":
          description: Current ticker snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TickerResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /get_orderbook:
    get:
      operationId: getOrderbook
      summary: Order book for a market
      description: |
        Returns the current limit order book: sorted arrays of bids (buy orders)
        and asks (sell orders). Each entry is [price, amount].
      parameters:
        - name: market_id
          in: query
          required: true
          description: Market identifier (e.g. "BTC-CLP"). Case-insensitive.
          schema:
            type: string
            example: BTC-CLP
        - name: limit
          in: query
          required: false
          description: Max number of price levels to return per side. Defaults to all.
          schema:
            type: integer
            minimum: 1
            example: 20
      responses:
        "200":
          description: Order book bids and asks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderBookResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /get_trades:
    get:
      operationId: getTrades
      summary: Recent trade history for a market
      description: |
        Returns recent trades. Each entry is [timestamp_ms, amount, price, direction]
        where direction is "buy" or "sell".
      parameters:
        - name: market_id
          in: query
          required: true
          description: Market identifier (e.g. "BTC-CLP"). Case-insensitive.
          schema:
            type: string
            example: BTC-CLP
        - name: limit
          in: query
          required: false
          description: Number of trades to return (default 50, max 100).
          schema:
            type: integer
            minimum: 1
            maximum: 100
            example: 50
        - name: timestamp
          in: query
          required: false
          description: |
            Unix timestamp in seconds. Returns trades older than this value,
            for pagination through history.
          schema:
            type: integer
            example: 1712000000
      responses:
        "200":
          description: Trade history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradesResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /get_market_volume:
    get:
      operationId: getMarketVolume
      summary: 24h and 7-day volume for a market
      description: |
        Returns transacted volume broken down by side (ask = sell, bid = buy)
        and time window (24h and 7d). Amounts are in the market's base currency.
      parameters:
        - name: market_id
          in: query
          required: true
          description: Market identifier (e.g. "BTC-CLP"). Case-insensitive.
          schema:
            type: string
            example: BTC-CLP
      responses:
        "200":
          description: Volume data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VolumeResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /get_spread:
    get:
      operationId: getSpread
      summary: Bid/ask spread for a market
      description: |
        Returns the best bid price, best ask price, absolute spread, and spread as a percentage
        of the ask price. Useful for assessing market liquidity.
      parameters:
        - name: market_id
          in: query
          required: true
          description: Market identifier (e.g. "BTC-CLP"). Case-insensitive.
          schema:
            type: string
            example: BTC-CLP
      responses:
        "200":
          description: Spread data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpreadResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /compare_markets:
    get:
      operationId: compareMarkets
      summary: Compare all pairs of a base currency side by side
      description: |
        Returns ticker data for all trading pairs of a given base currency across all supported
        quote currencies (CLP, COP, PEN, USDC, BTC, ETH). For example, base_currency=BTC returns
        data for BTC-CLP, BTC-COP, BTC-PEN, and BTC-USDC.
      parameters:
        - name: base_currency
          in: query
          required: true
          description: Base currency to compare (e.g. "BTC", "ETH"). Case-insensitive.
          schema:
            type: string
            example: BTC
      responses:
        "200":
          description: Comparison of all pairs for the given base currency
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompareMarketsResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /get_price_history:
    get:
      operationId: getPriceHistory
      summary: OHLCV price history derived from trade history
      description: |
        IMPORTANT: Candles are aggregated client-side from raw trades (Buda has no native
        candlestick endpoint) — increase 'limit' for deeper history but expect slower responses.
        Returns OHLCV (open/high/low/close/volume) candles. Candle timestamps are UTC bucket
        boundaries. Supports 1h, 4h, and 1d candle periods.
      parameters:
        - name: market_id
          in: query
          required: true
          description: Market identifier (e.g. "BTC-CLP"). Case-insensitive.
          schema:
            type: string
            example: BTC-CLP
        - name: period
          in: query
          required: false
          description: Candle period. One of "1h", "4h", "1d". Default is "1h".
          schema:
            type: string
            enum: ["1h", "4h", "1d"]
            default: "1h"
        - name: limit
          in: query
          required: false
          description: Number of raw trades to fetch before aggregation (default 100, max 1000). More trades = deeper history.
          schema:
            type: integer
            minimum: 1
            maximum: 1000
      responses:
        "200":
          description: OHLCV candles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceHistoryResponse"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  schemas:
    Amount:
      type: array
      description: Monetary amount as [value_string, currency_code]
      items:
        type: string
      minItems: 2
      maxItems: 2
      example: ["65929908.0", "CLP"]

    Market:
      type: object
      properties:
        id:
          type: string
          example: BTC-CLP
        name:
          type: string
          example: btc-clp
        base_currency:
          type: string
          example: BTC
        quote_currency:
          type: string
          example: CLP
        minimum_order_amount:
          $ref: "#/components/schemas/Amount"
        taker_fee:
          type: string
          example: "0.8"
        maker_fee:
          type: string
          example: "0.4"
        max_orders_per_minute:
          type: integer
          example: 100
        maker_discount_percentage:
          type: string
        taker_discount_percentage:
          type: string

    MarketsResponse:
      type: object
      properties:
        markets:
          type: array
          items:
            $ref: "#/components/schemas/Market"

    SingleMarketResponse:
      type: object
      properties:
        market:
          $ref: "#/components/schemas/Market"

    Ticker:
      type: object
      properties:
        market_id:
          type: string
          example: BTC-CLP
        last_price:
          $ref: "#/components/schemas/Amount"
        max_bid:
          $ref: "#/components/schemas/Amount"
        min_ask:
          $ref: "#/components/schemas/Amount"
        volume:
          $ref: "#/components/schemas/Amount"
        price_variation_24h:
          type: string
          description: Decimal fraction (e.g. "0.014" = +1.4%)
          example: "0.014"
        price_variation_7d:
          type: string
          example: "-0.032"

    TickerResponse:
      type: object
      properties:
        ticker:
          $ref: "#/components/schemas/Ticker"

    OrderBookResponse:
      type: object
      properties:
        bids:
          type: array
          description: Buy orders sorted best-first, each [price, amount]
          items:
            type: array
            items:
              type: string
            minItems: 2
            maxItems: 2
        asks:
          type: array
          description: Sell orders sorted best-first, each [price, amount]
          items:
            type: array
            items:
              type: string
            minItems: 2
            maxItems: 2
        bid_count:
          type: integer
          description: Total number of bid levels in the full book
        ask_count:
          type: integer
          description: Total number of ask levels in the full book

    TradeEntry:
      type: array
      description: "[timestamp_ms, amount, price, direction]"
      items:
        type: string
      minItems: 4
      maxItems: 4
      example: ["1775857164247", "0.00113757", "65929908.0", "buy"]

    TradesResponse:
      type: object
      properties:
        trades:
          type: object
          properties:
            market_id:
              type: string
              example: BTC-CLP
            timestamp:
              type: string
              description: Most recent trade timestamp (ms)
            last_timestamp:
              type: string
              description: Oldest trade timestamp in this response (ms)
            entries:
              type: array
              items:
                $ref: "#/components/schemas/TradeEntry"

    VolumeResponse:
      type: object
      properties:
        volume:
          type: object
          properties:
            market_id:
              type: string
              example: BTC-CLP
            ask_volume_24h:
              $ref: "#/components/schemas/Amount"
            ask_volume_7d:
              $ref: "#/components/schemas/Amount"
            bid_volume_24h:
              $ref: "#/components/schemas/Amount"
            bid_volume_7d:
              $ref: "#/components/schemas/Amount"

    SpreadResponse:
      type: object
      properties:
        market_id:
          type: string
          example: BTC-CLP
        currency:
          type: string
          example: CLP
        best_bid:
          type: string
          example: "65221128.0"
        best_ask:
          type: string
          example: "65727568.0"
        spread_absolute:
          type: string
          example: "506440.00"
        spread_percentage:
          type: string
          example: "0.7705%"
        last_price:
          type: string
          example: "65221078.43"

    CompareMarketsResponse:
      type: object
      properties:
        base_currency:
          type: string
          example: BTC
        markets:
          type: array
          items:
            type: object
            properties:
              market_id:
                type: string
                example: BTC-CLP
              last_price:
                type: string
                example: "65221078.43"
              currency:
                type: string
                example: CLP
              best_bid:
                type: string
              best_ask:
                type: string
              volume_24h:
                type: string
              price_change_24h:
                type: string
                example: "0.30%"
              price_change_7d:
                type: string
                example: "-1.20%"

    OhlcvCandle:
      type: object
      properties:
        time:
          type: string
          format: date-time
          example: "2026-04-10T12:00:00.000Z"
        open:
          type: string
          example: "65221078.43"
        high:
          type: string
          example: "65975364.0"
        low:
          type: string
          example: "65164404.87"
        close:
          type: string
          example: "65386647.0"
        volume:
          type: string
          example: "0.52341200"
        trade_count:
          type: integer
          example: 12

    PriceHistoryResponse:
      type: object
      properties:
        market_id:
          type: string
          example: BTC-CLP
        period:
          type: string
          example: "1h"
        candle_count:
          type: integer
          example: 6
        note:
          type: string
        candles:
          type: array
          items:
            $ref: "#/components/schemas/OhlcvCandle"

    Error:
      type: object
      properties:
        error:
          type: string
        code:
          oneOf:
            - type: string
            - type: integer

  responses:
    NotFound:
      description: Market not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
