openapi: 3.1.0
info:
  title: Buda.com Market Data API
  description: |
    Real-time cryptocurrency market data from Buda.com — the leading exchange
    in Chile (CLP), Colombia (COP), and Peru (PEN).
    Provides live prices, spreads, OHLCV history, order books, trade history, and volume for all markets.
    No authentication required for public tools.

    All response schemas are flat and typed: monetary amounts are returned as floats with
    separate _currency fields instead of [amount, currency] arrays.

    **Note:** This spec describes a deployed HTTP wrapper around the buda-mcp
    stdio server. Deploy locally with mcp-proxy:
      mcp-proxy --port 8000 -- npx -y @guiie/buda-mcp
    Or point `servers[0].url` at your hosted instance.
  version: 2.0.0
  contact:
    url: https://github.com/gtorreal/buda-mcp

servers:
  - url: https://YOUR_DEPLOYED_DOMAIN
    description: Deployed buda-mcp HTTP instance

paths:
  /get_markets:
    get:
      operationId: getMarkets
      summary: List all trading pairs
      description: |
        Lists all available markets on Buda.com, or details for a single market.
        Each market entry includes base/quote currencies, taker/maker fees as decimals,
        minimum order amount, and fee discount tiers.
        Example: 'What is the taker fee and minimum order size for BTC-CLP?'
      parameters:
        - name: market_id
          in: query
          required: false
          description: |
            Market identifier (e.g. "BTC-CLP", "ETH-BTC"). Case-insensitive.
            Omit to return all markets.
          schema:
            type: string
            example: BTC-CLP
      responses:
        "200":
          description: Market list or single market details
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/MarketsResponse"
                  - $ref: "#/components/schemas/SingleMarketResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /get_ticker:
    get:
      operationId: getTicker
      summary: Current price and volume for a market
      description: |
        Returns the current market snapshot: last traded price, best bid (max_bid),
        best ask (min_ask), 24h volume, and price change over 24h and 7d.
        All prices are floats in the quote currency. price_variation_24h is a decimal fraction.
        Example: 'What is the current Bitcoin price in Chilean pesos?'
      parameters:
        - name: market_id
          in: query
          required: true
          description: Market identifier (e.g. "BTC-CLP", "ETH-COP"). Case-insensitive.
          schema:
            type: string
            example: BTC-CLP
      responses:
        "200":
          description: Current ticker snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TickerResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /get_orderbook:
    get:
      operationId: getOrderbook
      summary: Order book for a market
      description: |
        Returns the current limit order book as typed objects with float price and amount fields.
        Bids are sorted highest-price first; asks lowest-price first.
        Prices are in the quote currency; amounts are in the base currency.
        Example: 'What are the top 5 buy and sell orders for BTC-CLP right now?'
      parameters:
        - name: market_id
          in: query
          required: true
          description: Market identifier (e.g. "BTC-CLP"). Case-insensitive.
          schema:
            type: string
            example: BTC-CLP
        - name: limit
          in: query
          required: false
          description: Max number of price levels to return per side. Defaults to all.
          schema:
            type: integer
            minimum: 1
            example: 20
      responses:
        "200":
          description: Order book bids and asks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderBookResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /get_trades:
    get:
      operationId: getTrades
      summary: Recent trade history for a market
      description: |
        Returns recent trades as typed objects with float fields.
        Each entry has timestamp_ms (integer), amount (float, base currency),
        price (float, quote currency), and direction ("buy" or "sell").
        Example: 'What was the last executed price for BTC-CLP and was it a buy or sell?'
      parameters:
        - name: market_id
          in: query
          required: true
          description: Market identifier (e.g. "BTC-CLP"). Case-insensitive.
          schema:
            type: string
            example: BTC-CLP
        - name: limit
          in: query
          required: false
          description: Number of trades to return (default 50, max 100).
          schema:
            type: integer
            minimum: 1
            maximum: 100
            example: 50
        - name: timestamp
          in: query
          required: false
          description: |
            Unix timestamp in seconds. Returns trades older than this value,
            for pagination through history.
          schema:
            type: integer
            example: 1712000000
      responses:
        "200":
          description: Trade history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradesResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /get_market_volume:
    get:
      operationId: getMarketVolume
      summary: 24h and 7-day volume for a market
      description: |
        Returns transacted volume as floats broken down by side (ask = sell, bid = buy)
        and time window (24h and 7d). All volumes are in the market's base currency.
        Example: 'How much Bitcoin was sold on BTC-CLP in the last 24 hours?'
      parameters:
        - name: market_id
          in: query
          required: true
          description: Market identifier (e.g. "BTC-CLP"). Case-insensitive.
          schema:
            type: string
            example: BTC-CLP
      responses:
        "200":
          description: Volume data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VolumeResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /get_spread:
    get:
      operationId: getSpread
      summary: Bid/ask spread for a market
      description: |
        Returns the best bid price, best ask price, absolute spread, and spread percentage
        as floats. spread_percentage is in percent (e.g. 0.15 means 0.15%).
        Example: 'Is BTC-CLP liquid enough to buy 10M CLP without significant slippage?'
      parameters:
        - name: market_id
          in: query
          required: true
          description: Market identifier (e.g. "BTC-CLP"). Case-insensitive.
          schema:
            type: string
            example: BTC-CLP
      responses:
        "200":
          description: Spread data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpreadResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /compare_markets:
    get:
      operationId: compareMarkets
      summary: Compare all pairs of a base currency side by side
      description: |
        Returns ticker data for all trading pairs of a given base currency across all supported
        quote currencies (CLP, COP, PEN, USDC, BTC, ETH). All prices and change values are floats.
        price_change_24h is in percent (e.g. 1.23 means +1.23%).
        Example: 'In which country is Bitcoin currently most expensive on Buda?'
      parameters:
        - name: base_currency
          in: query
          required: true
          description: Base currency to compare (e.g. "BTC", "ETH"). Case-insensitive.
          schema:
            type: string
            example: BTC
      responses:
        "200":
          description: Comparison of all pairs for the given base currency
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompareMarketsResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /get_price_history:
    get:
      operationId: getPriceHistory
      summary: OHLCV price history derived from trade history
      description: |
        IMPORTANT: Candles are aggregated client-side from raw trades (Buda has no native
        candlestick endpoint) — increase 'limit' for deeper history but expect slower responses.
        Returns OHLCV candles with float values (open/high/low/close in quote currency,
        volume in base currency). Candle timestamps are UTC bucket boundaries.
        Supports 1h, 4h, and 1d candle periods.
        Example: 'Show me the hourly BTC-CLP price chart for the past 24 hours.'
      parameters:
        - name: market_id
          in: query
          required: true
          description: Market identifier (e.g. "BTC-CLP"). Case-insensitive.
          schema:
            type: string
            example: BTC-CLP
        - name: period
          in: query
          required: false
          description: Candle period. One of "1h", "4h", "1d". Default is "1h".
          schema:
            type: string
            enum: ["1h", "4h", "1d"]
            default: "1h"
        - name: limit
          in: query
          required: false
          description: Number of raw trades to fetch before aggregation (default 100, max 1000). More trades = deeper history.
          schema:
            type: integer
            minimum: 1
            maximum: 1000
      responses:
        "200":
          description: OHLCV candles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceHistoryResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /get_market_summary:
    get:
      operationId: getMarketSummary
      summary: Complete market overview in a single call
      description: |
        One-call summary of everything relevant about a market: last price, best bid/ask,
        spread %, 24h volume, 24h and 7d price change, and a liquidity_rating.
        liquidity_rating: "high" (spread < 0.3%), "medium" (0.3–1%), "low" (> 1%).
        All prices and volumes are floats. Best first tool to call when a user asks about a specific market.
        Example: 'Give me a complete overview of the BTC-CLP market right now.'
      parameters:
        - name: market_id
          in: query
          required: true
          description: Market identifier (e.g. "BTC-CLP", "ETH-COP"). Case-insensitive.
          schema:
            type: string
            example: BTC-CLP
      responses:
        "200":
          description: Full market summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketSummaryResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /get_arbitrage_opportunities:
    get:
      operationId: getArbitrageOpportunities
      summary: Cross-country price discrepancies normalized to USDC
      description: |
        Detects price discrepancies for a given asset across Buda's CLP, COP, and PEN markets,
        normalized to USDC using current exchange rates. Returns pairwise discrepancies above
        threshold_pct, sorted descending by opportunity size.
        IMPORTANT: Buda taker fee is 0.8% per leg (~1.6% round-trip). Deduct fees before acting.
        Example: 'Is there an arbitrage opportunity for BTC between Chile and Peru right now?'
      parameters:
        - name: base_currency
          in: query
          required: true
          description: Base asset to scan (e.g. "BTC", "ETH"). Case-insensitive.
          schema:
            type: string
            example: BTC
        - name: threshold_pct
          in: query
          required: false
          description: Minimum discrepancy percentage to include (default 0.5). Round-trip fees ~1.6%.
          schema:
            type: number
            minimum: 0
            default: 0.5
            example: 1.0
      responses:
        "200":
          description: Arbitrage opportunities found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArbitrageResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /simulate_order:
    get:
      operationId: simulateOrder
      summary: Simulate a buy or sell order without placing it
      description: |
        Simulates a buy or sell order using live ticker data — no order is ever placed.
        Returns estimated fill price, fee amount, total cost, and slippage vs mid-price.
        Omit 'price' for a market order simulation; supply 'price' for a limit order simulation.
        All outputs include simulation: true.
        Example: 'How much would it cost to buy 0.01 BTC on BTC-CLP right now?'
      parameters:
        - name: market_id
          in: query
          required: true
          description: Market identifier (e.g. "BTC-CLP", "ETH-BTC"). Case-insensitive.
          schema:
            type: string
            example: BTC-CLP
        - name: side
          in: query
          required: true
          description: Order side — "buy" or "sell".
          schema:
            type: string
            enum: [buy, sell]
        - name: amount
          in: query
          required: true
          description: Order size in base currency (e.g. BTC for BTC-CLP).
          schema:
            type: number
            minimum: 0
            example: 0.01
        - name: price
          in: query
          required: false
          description: Limit price in quote currency. Omit for a market order simulation.
          schema:
            type: number
            minimum: 0
            example: 80000000
      responses:
        "200":
          description: Order simulation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulateOrderResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /calculate_position_size:
    get:
      operationId: calculatePositionSize
      summary: Calculate position size from capital and risk parameters
      description: |
        Calculates position size based on capital, risk tolerance, entry price, and stop-loss.
        Determines how many units to buy or sell so that a stop-loss hit costs exactly risk_pct% of capital.
        Fully client-side — no API call is made.
        Example: 'How many BTC can I buy with 1,000,000 CLP, risking 2%, entry 80,000,000 CLP, stop at 78,000,000 CLP?'
      parameters:
        - name: market_id
          in: query
          required: true
          description: Market identifier (e.g. "BTC-CLP"). Used to derive base and quote currencies.
          schema:
            type: string
            example: BTC-CLP
        - name: capital
          in: query
          required: true
          description: Total available capital in the quote currency (e.g. CLP for BTC-CLP).
          schema:
            type: number
            minimum: 0
            example: 1000000
        - name: risk_pct
          in: query
          required: true
          description: Percentage of capital to risk on this trade (0.1–10, e.g. 2 means 2%).
          schema:
            type: number
            minimum: 0.1
            maximum: 10
            example: 2
        - name: entry_price
          in: query
          required: true
          description: Planned entry price in quote currency.
          schema:
            type: number
            minimum: 0
            example: 80000000
        - name: stop_loss_price
          in: query
          required: true
          description: Stop-loss price in quote currency. Must differ from entry_price.
          schema:
            type: number
            minimum: 0
            example: 78000000
      responses:
        "200":
          description: Position sizing result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PositionSizeResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /get_market_sentiment:
    get:
      operationId: getMarketSentiment
      summary: Composite sentiment score for a market
      description: |
        Computes a composite sentiment score (−100 to +100) based on 24h price variation (40%),
        volume vs 7-day average (35%), and bid/ask spread vs baseline (25%).
        Returns a score, a label (bearish/neutral/bullish), and a full component breakdown.
        Example: 'Is the BTC-CLP market currently bullish or bearish?'
      parameters:
        - name: market_id
          in: query
          required: true
          description: Market identifier (e.g. "BTC-CLP", "ETH-BTC"). Case-insensitive.
          schema:
            type: string
            example: BTC-CLP
      responses:
        "200":
          description: Market sentiment result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketSentimentResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /get_available_banks:
    get:
      operationId: getAvailableBanks
      summary: Banks available for deposits and withdrawals of a fiat currency
      description: |
        Returns banks available for deposits and withdrawals of a given fiat currency on Buda.com.
        Returns an empty banks array (not an error) if the currency has no associated banks
        (e.g. crypto currencies or unsupported fiat currencies). Results are cached for 60 seconds.
        Example: 'Which banks can I use for CLP deposits?'
      parameters:
        - name: currency
          in: query
          required: true
          description: Fiat currency code (e.g. "CLP", "COP", "PEN"). Case-insensitive.
          schema:
            type: string
            example: CLP
      responses:
        "200":
          description: Available banks for the currency
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailableBanksResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /get_real_quotation:
    post:
      operationId: getRealQuotation
      summary: Server-side price quotation for a buy or sell
      description: |
        Calls the Buda quotation API to compute an accurate fill estimate including fees,
        based on live order book state. Prefer this over simulate_order for accurate fee-tier-aware quotes.
        This is a POST but does not place an order. Public endpoint — no API key required.
        Example: 'Get an accurate quote to sell 0.05 BTC on BTC-CLP.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [market_id, type, amount]
              properties:
                market_id:
                  type: string
                  description: Market identifier (e.g. "BTC-CLP", "ETH-BTC"). Case-insensitive.
                  example: BTC-CLP
                type:
                  type: string
                  enum: [Bid, Ask]
                  description: "'Bid' to buy base currency, 'Ask' to sell base currency."
                amount:
                  type: number
                  minimum: 0
                  description: Order size in base currency (e.g. BTC for BTC-CLP).
                  example: 0.05
                limit:
                  type: number
                  minimum: 0
                  description: Optional limit price in quote currency.
      responses:
        "200":
          description: Quotation result with fill price, fees, and balance changes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuotationResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /get_technical_indicators:
    get:
      operationId: getTechnicalIndicators
      summary: RSI, MACD, Bollinger Bands, SMA20, SMA50 from trade history
      description: |
        Computes RSI (14), MACD (12/26/9), Bollinger Bands (20, 2σ), SMA 20, and SMA 50
        from Buda trade history — no external data or libraries required.
        Uses at least 500 trades for reliable results (set limit=1000 for maximum depth).
        Returns latest indicator values and signal interpretations (overbought/oversold, crossover, band position).
        If fewer than 50 candles are available after aggregation, returns a structured warning instead.
        Example: 'Is BTC-CLP RSI overbought on the 4-hour chart?'
      parameters:
        - name: market_id
          in: query
          required: true
          description: Market identifier (e.g. "BTC-CLP", "ETH-BTC"). Case-insensitive.
          schema:
            type: string
            example: BTC-CLP
        - name: period
          in: query
          required: false
          description: Candle period. One of "1h", "4h", "1d". Default is "1h".
          schema:
            type: string
            enum: ["1h", "4h", "1d"]
            default: "1h"
        - name: limit
          in: query
          required: false
          description: Number of raw trades to fetch (default 500, max 1000). More trades = more candles = more reliable indicators.
          schema:
            type: integer
            minimum: 500
            maximum: 1000
      responses:
        "200":
          description: Technical indicators result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TechnicalIndicatorsResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /get_stable_liquidity:
    get:
      operationId: getStableLiquidity
      summary: Spread and slippage for all stablecoin markets
      description: |
        Returns spread and orderbook-depth slippage for all stablecoin markets on Buda.com
        (USDT-CLP, USDC-CLP, USDT-PEN, USDC-PEN, USDT-COP, USDC-COP, USDT-USDC, etc.).
        Slippage is computed by walking the live order book for five fixed USD notional sizes:
        1k, 5k, 10k, 50k, and 100k. Positive buy_pct means you pay more than the best ask;
        negative sell_pct means you receive less than the best bid.
        null values indicate insufficient order book depth for that size.
        Markets are discovered dynamically — new stablecoin markets appear automatically.
        Example: 'How liquid are the stablecoin markets on Buda right now?'
      responses:
        "200":
          description: Stable liquidity snapshot for all stablecoin markets
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    market_id:
                      type: string
                      example: USDT-CLP
                    quote_currency:
                      type: string
                      example: CLP
                    best_bid:
                      type: number
                    best_ask:
                      type: number
                    spread_pct:
                      type: number
                      description: Bid/ask spread as a percentage of best ask.
                    slippage:
                      type: object
                      properties:
                        usd_1k:
                          $ref: "#/components/schemas/SlippageEntry"
                        usd_5k:
                          $ref: "#/components/schemas/SlippageEntry"
                        usd_10k:
                          $ref: "#/components/schemas/SlippageEntry"
                        usd_50k:
                          $ref: "#/components/schemas/SlippageEntry"
                        usd_100k:
                          $ref: "#/components/schemas/SlippageEntry"
                    data_timestamp:
                      type: string
                      format: date-time

components:
  schemas:
    Market:
      type: object
      properties:
        id:
          type: string
          example: BTC-CLP
        name:
          type: string
          example: btc-clp
        base_currency:
          type: string
          example: BTC
        quote_currency:
          type: string
          example: CLP
        minimum_order_amount:
          type: array
          items:
            type: string
          example: ["0.00001", "BTC"]
        taker_fee:
          type: string
          example: "0.8"
        maker_fee:
          type: string
          example: "0.4"
        max_orders_per_minute:
          type: integer
          example: 100
        maker_discount_percentage:
          type: string
        taker_discount_percentage:
          type: string

    MarketsResponse:
      type: object
      properties:
        markets:
          type: array
          items:
            $ref: "#/components/schemas/Market"

    SingleMarketResponse:
      type: object
      properties:
        market:
          $ref: "#/components/schemas/Market"

    TickerResponse:
      type: object
      properties:
        market_id:
          type: string
          example: BTC-CLP
        last_price:
          type: number
          example: 65675000
        last_price_currency:
          type: string
          example: CLP
        min_ask:
          type: number
          example: 65678531
        min_ask_currency:
          type: string
          example: CLP
        max_bid:
          type: number
          example: 65675000
        max_bid_currency:
          type: string
          example: CLP
        volume:
          type: number
          example: 5.00837363
        volume_currency:
          type: string
          example: BTC
        price_variation_24h:
          type: number
          description: Decimal fraction (e.g. 0.019 = +1.9%)
          example: 0.019
        price_variation_7d:
          type: number
          example: -0.032

    OrderBookEntry:
      type: object
      properties:
        price:
          type: number
          example: 65675000
        amount:
          type: number
          example: 0.01520608

    OrderBookResponse:
      type: object
      properties:
        bids:
          type: array
          description: Buy orders sorted highest-price first
          items:
            $ref: "#/components/schemas/OrderBookEntry"
        asks:
          type: array
          description: Sell orders sorted lowest-price first
          items:
            $ref: "#/components/schemas/OrderBookEntry"
        bid_count:
          type: integer
          description: Total number of bid levels in the full book
        ask_count:
          type: integer
          description: Total number of ask levels in the full book

    TradeEntry:
      type: object
      properties:
        timestamp_ms:
          type: integer
          example: 1775857164247
        amount:
          type: number
          example: 0.00113757
        price:
          type: number
          example: 65675000
        direction:
          type: string
          enum: [buy, sell]
          example: buy

    TradesResponse:
      type: object
      properties:
        timestamp:
          type: string
          description: Most recent trade timestamp (ms)
        last_timestamp:
          type: string
          description: Oldest trade timestamp in this response (ms)
        market_id:
          type: string
          example: BTC-CLP
        entries:
          type: array
          items:
            $ref: "#/components/schemas/TradeEntry"

    VolumeResponse:
      type: object
      properties:
        market_id:
          type: string
          example: BTC-CLP
        ask_volume_24h:
          type: number
          example: 0.63744329
        ask_volume_24h_currency:
          type: string
          example: BTC
        ask_volume_7d:
          type: number
          example: 7.41219004
        ask_volume_7d_currency:
          type: string
          example: BTC
        bid_volume_24h:
          type: number
          example: 4.37093034
        bid_volume_24h_currency:
          type: string
          example: BTC
        bid_volume_7d:
          type: number
          example: 11.93962368
        bid_volume_7d_currency:
          type: string
          example: BTC

    SpreadResponse:
      type: object
      properties:
        market_id:
          type: string
          example: BTC-CLP
        price_currency:
          type: string
          example: CLP
        best_bid:
          type: number
          example: 65675000
        best_ask:
          type: number
          example: 65678531
        spread_absolute:
          type: number
          example: 3531
        spread_percentage:
          type: number
          description: Spread as percent of ask price (e.g. 0.0054 means 0.0054%)
          example: 0.0054
        last_price:
          type: number
          example: 65675000

    CompareMarketsResponse:
      type: object
      properties:
        base_currency:
          type: string
          example: BTC
        markets:
          type: array
          items:
            type: object
            properties:
              market_id:
                type: string
                example: BTC-CLP
              last_price:
                type: number
                example: 65675000
              last_price_currency:
                type: string
                example: CLP
              best_bid:
                type: number
              best_ask:
                type: number
              volume_24h:
                type: number
              price_change_24h:
                type: number
                description: In percent (e.g. 1.23 means +1.23%)
                example: 1.23
              price_change_7d:
                type: number
                example: -1.20

    OhlcvCandle:
      type: object
      properties:
        time:
          type: string
          format: date-time
          example: "2026-04-10T12:00:00.000Z"
        open:
          type: number
          example: 65221078.43
        high:
          type: number
          example: 65975364
        low:
          type: number
          example: 65164404.87
        close:
          type: number
          example: 65386647
        volume:
          type: number
          example: 0.52341200
        trade_count:
          type: integer
          example: 12

    PriceHistoryResponse:
      type: object
      properties:
        market_id:
          type: string
          example: BTC-CLP
        period:
          type: string
          example: "1h"
        candle_count:
          type: integer
          example: 6
        trades_fetched:
          type: integer
          example: 100
        note:
          type: string
        candles:
          type: array
          items:
            $ref: "#/components/schemas/OhlcvCandle"

    MarketSummaryResponse:
      type: object
      properties:
        market_id:
          type: string
          example: BTC-CLP
        last_price:
          type: number
          example: 65675000
        last_price_currency:
          type: string
          example: CLP
        bid:
          type: number
          example: 65675000
        ask:
          type: number
          example: 65678531
        spread_pct:
          type: number
          description: Bid/ask spread as percentage of ask
          example: 0.0054
        volume_24h:
          type: number
          example: 5.00837363
        volume_24h_currency:
          type: string
          example: BTC
        price_change_24h:
          type: number
          description: In percent (e.g. 1.9 means +1.9%)
          example: 1.9
        price_change_7d:
          type: number
          example: -3.2
        liquidity_rating:
          type: string
          enum: [high, medium, low]
          description: "high: spread < 0.3%, medium: 0.3–1%, low: > 1%"
          example: high

    ArbitrageMarketPrice:
      type: object
      properties:
        market_id:
          type: string
          example: BTC-CLP
        price_usdc:
          type: number
          example: 65675
        local_price:
          type: number
          example: 65675000
        usdc_rate:
          type: number
          example: 1000

    ArbitrageOpportunity:
      type: object
      properties:
        market_a:
          type: string
          example: BTC-CLP
        market_b:
          type: string
          example: BTC-PEN
        price_a_usdc:
          type: number
          example: 65675
        price_b_usdc:
          type: number
          example: 67568
        discrepancy_pct:
          type: number
          example: 2.88
        higher_market:
          type: string
          example: BTC-PEN
        lower_market:
          type: string
          example: BTC-CLP

    ArbitrageResponse:
      type: object
      properties:
        base_currency:
          type: string
          example: BTC
        threshold_pct:
          type: number
          example: 0.5
        markets_analyzed:
          type: array
          items:
            $ref: "#/components/schemas/ArbitrageMarketPrice"
        opportunities_found:
          type: integer
          example: 1
        opportunities:
          type: array
          items:
            $ref: "#/components/schemas/ArbitrageOpportunity"
        fees_note:
          type: string
          example: "Buda taker fee is 0.8% per leg. A round-trip arbitrage costs approximately 1.6% in fees."

    BankEntry:
      type: object
      properties:
        id:
          type: string
          example: banco_estado
        name:
          type: string
          example: Banco Estado
        country:
          type: string
          nullable: true
          example: CL

    AvailableBanksResponse:
      type: object
      properties:
        currency:
          type: string
          example: CLP
        banks:
          type: array
          description: Empty array if no banks are available for this currency.
          items:
            $ref: "#/components/schemas/BankEntry"

    QuotationResponse:
      type: object
      properties:
        id:
          type: integer
          nullable: true
          example: 12345
        type:
          type: string
          enum: [Bid, Ask]
        market_id:
          type: string
          example: BTC-CLP
        amount:
          type: number
          description: Requested order size in base currency.
          example: 0.05
        amount_currency:
          type: string
          example: BTC
        limit:
          type: number
          nullable: true
          description: Limit price in quote currency, if provided.
        limit_currency:
          type: string
          nullable: true
          example: CLP
        base_balance_change:
          type: number
          description: Net change to base currency balance (negative for Ask).
          example: -0.05
        base_balance_change_currency:
          type: string
          example: BTC
        quote_balance_change:
          type: number
          description: Net change to quote currency balance (negative for Bid).
          example: 4000000
        quote_balance_change_currency:
          type: string
          example: CLP
        fee_amount:
          type: number
          description: Fee charged in quote currency.
          example: 32000
        fee_currency:
          type: string
          example: CLP
        order_amount:
          type: number
          description: Gross order value before fees.
          example: 4032000
        order_amount_currency:
          type: string
          example: CLP

    SimulateOrderResponse:
      type: object
      properties:
        simulation:
          type: boolean
          example: true
        market_id:
          type: string
          example: BTC-CLP
        side:
          type: string
          enum: [buy, sell]
        amount:
          type: number
          example: 0.01
        order_type_assumed:
          type: string
          enum: [market, limit]
        estimated_fill_price:
          type: number
          example: 80000000
        price_currency:
          type: string
          example: CLP
        fee_amount:
          type: number
          example: 6400
        fee_currency:
          type: string
          example: CLP
        fee_rate_pct:
          type: number
          example: 0.8
        total_cost:
          type: number
          description: Total outlay for buys (gross + fee) or net proceeds for sells (gross − fee).
          example: 806400
        slippage_vs_mid_pct:
          type: number
          description: Percentage difference between estimated fill price and mid-price.
          example: 0.0027
        mid_price:
          type: number
          example: 79997840

    PositionSizeResponse:
      type: object
      properties:
        market_id:
          type: string
          example: BTC-CLP
        side:
          type: string
          enum: [buy, sell]
        units:
          type: number
          description: Number of base currency units to trade.
          example: 0.01
        base_currency:
          type: string
          example: BTC
        capital_at_risk:
          type: number
          description: Amount of capital at risk (capital × risk_pct / 100) in quote currency.
          example: 20000
        position_value:
          type: number
          description: Total position value in quote currency (units × entry_price).
          example: 800000
        fee_impact:
          type: number
          description: Estimated entry fee at 0.8% taker rate in quote currency.
          example: 6400
        fee_currency:
          type: string
          example: CLP
        risk_reward_note:
          type: string
          description: Human-readable summary of the trade setup.

    MarketSentimentResponse:
      type: object
      properties:
        market_id:
          type: string
          example: BTC-CLP
        score:
          type: number
          description: Composite sentiment score from −100 (very bearish) to +100 (very bullish).
          example: 23.5
        label:
          type: string
          enum: [bearish, neutral, bullish]
          example: bullish
        component_breakdown:
          type: object
          properties:
            price_variation_24h_pct:
              type: number
              example: 1.9
            volume_ratio:
              type: number
              description: Today's volume vs 7-day daily average (1.0 = average).
              example: 1.25
            spread_pct:
              type: number
              example: 0.005
            spread_baseline_pct:
              type: number
              example: 1.0
            price_score:
              type: number
            volume_score:
              type: number
            spread_score:
              type: number
        data_timestamp:
          type: string
          format: date-time
        disclaimer:
          type: string

    TechnicalIndicatorsResponse:
      type: object
      properties:
        market_id:
          type: string
          example: BTC-CLP
        period:
          type: string
          enum: ["1h", "4h", "1d"]
        candles_used:
          type: integer
          example: 85
        indicators:
          type: object
          nullable: true
          properties:
            rsi:
              type: number
              nullable: true
              description: RSI(14). null if insufficient data.
              example: 62.4
            macd:
              type: object
              nullable: true
              properties:
                line:
                  type: number
                signal:
                  type: number
                histogram:
                  type: number
            bollinger_bands:
              type: object
              nullable: true
              properties:
                upper:
                  type: number
                mid:
                  type: number
                lower:
                  type: number
            sma_20:
              type: number
            sma_50:
              type: number
              nullable: true
              description: "Null when fewer than 50 candles are available; check sma_50_warning."
            sma_50_warning:
              type: string
              description: "Present only when sma_50 is null. Explains why SMA-50 could not be computed."
        signals:
          type: object
          properties:
            rsi_signal:
              type: string
              enum: [overbought, oversold, neutral]
            macd_signal:
              type: string
              enum: [bullish_crossover, bearish_crossover, neutral]
            bb_signal:
              type: string
              enum: [above_upper, below_lower, within_bands]
        warning:
          type: string
          description: Present only when candles_available < 50. Value is "insufficient_data".
        candles_available:
          type: integer
          description: Present only when warning is set.
        minimum_required:
          type: integer
          description: Present only when warning is set. Always 50.
        disclaimer:
          type: string

    SlippageEntry:
      type: object
      properties:
        buy_pct:
          type: number
          nullable: true
          description: >
            Buy slippage vs best ask as a percentage. Positive = you pay more than best ask.
            null when order book depth is insufficient for this size.
        sell_pct:
          type: number
          nullable: true
          description: >
            Sell slippage vs best bid as a percentage. Negative = you receive less than best bid.
            null when order book depth is insufficient for this size.
        insufficient_liquidity:
          type: boolean
          description: Present and true only when buy_pct and sell_pct are null.

    Error:
      type: object
      properties:
        error:
          type: string
        code:
          oneOf:
            - type: string
            - type: integer

  responses:
    NotFound:
      description: Market not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
