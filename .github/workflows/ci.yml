name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Audit, build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      # Block on high/critical CVEs; low/moderate advisories are allowed through
      # (they are common in transitive deps and rarely applicable to server-side code).
      - run: npm audit --audit-level=high
      - run: npm run build
      - run: npm test
