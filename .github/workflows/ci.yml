name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Audit, build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      # Block on high/critical CVEs; low/moderate advisories are allowed through
      # (they are common in transitive deps and rarely applicable to server-side code).
      - run: npm audit --audit-level=high
      - run: npm run build
      - run: npm test
