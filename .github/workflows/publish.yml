name: Publish

on:
  release:
    types: [published]

jobs:
  # ── 1. Build & test ──────────────────────────────────────────────
  test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - run: npm test

  # ── 2. Publish to npm ────────────────────────────────────────────
  npm:
    name: Publish to npm
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - name: Publish (skip if version already exists)
        run: |
          PKG=$(node -e "console.log(require('./package.json').name)")
          VER=$(node -e "console.log(require('./package.json').version)")
          if npm view "${PKG}@${VER}" version &>/dev/null; then
            echo "Version ${VER} already published — skipping npm publish."
          else
            npm publish --access public --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── 3. Publish to MCP Registry ───────────────────────────────────
  mcp-registry:
    name: Publish to MCP Registry
    needs: npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      MCP_REGISTRY_TOKEN: ${{ secrets.MCP_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Install mcp-publisher
        run: |
          RELEASE_TAG=$(gh api repos/modelcontextprotocol/registry/releases/latest --jq '.tag_name')
          VER="${RELEASE_TAG#v}"
          curl -fsSL -o mcp-publisher.tar.gz \
            "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz"
          curl -fsSL -o checksums.txt \
            "https://github.com/modelcontextprotocol/registry/releases/download/${RELEASE_TAG}/registry_${VER}_checksums.txt"
          grep "mcp-publisher_linux_amd64.tar.gz" checksums.txt | sha256sum --check
          tar xzf mcp-publisher.tar.gz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Authenticate and publish to MCP Registry
        run: |
          mcp-publisher login token "$MCP_REGISTRY_TOKEN"
          mcp-publisher publish
